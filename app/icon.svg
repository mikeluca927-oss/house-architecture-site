<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Near-black background -->
  <rect width="32" height="32" fill="#1A1A1A"/>
  <!-- Thin gold inset border -->
  <rect x="2.5" y="2.5" width="27" height="27" fill="none" stroke="#C9A84C" stroke-width="0.6"/>
  <!-- Serif H: thick verticals, thin crossbar, with serif feet -->
  <!-- Left vertical -->
  <rect x="7" y="7.5" width="3" height="17" fill="#C9A84C"/>
  <!-- Left serifs top/bottom -->
  <rect x="5.5" y="7.5" width="6" height="0.8" fill="#C9A84C"/>
  <rect x="5.5" y="23.7" width="6" height="0.8" fill="#C9A84C"/>
  <!-- Right vertical -->
  <rect x="22" y="7.5" width="3" height="17" fill="#C9A84C"/>
  <!-- Right serifs top/bottom -->
  <rect x="20.5" y="7.5" width="6" height="0.8" fill="#C9A84C"/>
  <rect x="20.5" y="23.7" width="6" height="0.8" fill="#C9A84C"/>
  <!-- Thin crossbar -->
  <rect x="7" y="15.3" width="18" height="1.4" fill="#C9A84C"/>
</svg>
