name: Daily Blog Post

on:
  schedule:
    - cron: '0 12 * * *'  # 12 PM UTC = 8 AM ET daily
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate blog post via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/generate_blog_post.py "$(date +%Y-%m-%d)"

      - name: Commit and push
        run: |
          git config user.name "HAC Blog Bot"
          git config user.email "bot@housearchitectureandconstruction.com"
          git add content/blog/
          git diff --staged --quiet || git commit -m "Blog: $(date +%Y-%m-%d)"
          git push
